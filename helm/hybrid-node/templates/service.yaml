apiVersion: v1
kind: Service
metadata:
  name: {{ include "hybrid-node.fullname" . }}
  labels:
    {{- include "hybrid-node.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: node
      protocol: TCP
      name: node
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
    {{- if .Values.ekg.enabled }}
    - port: {{ .Values.ekg.port }}
      targetPort: ekg
      protocol: TCP
      name: ekg
    {{- end }}
    {{- if .Values.mithrilMetrics.enabled }}
    - port: {{ .Values.mithrilMetrics.port }}
      targetPort: mithril
      protocol: TCP
      name: mithril
    {{- end }}
  selector:
    {{- include "hybrid-node.selectorLabels" . | nindent 4 }}
