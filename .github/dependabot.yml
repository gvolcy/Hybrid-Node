version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Docker — Cardano Dockerfile
  - package-ecosystem: "docker"
    directory: "/platform/docker"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
      - "cardano"
    ignore:
      # Don't auto-bump node versions — requires manual validation per chain
      - dependency-name: "ghcr.io/blinklabs-io/haskell"

  # Helm chart
  - package-ecosystem: "docker"
    directory: "/charts/hybrid-node"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "helm"
