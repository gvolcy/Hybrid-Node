name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v10.7.0-cardano)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gvolcy/hybrid-node

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Parse version info
        id: version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Extract version and chain from tag like v10.7.0-cardano or v10.1.4-apexfusion
          VERSION=$(echo "$TAG" | sed 's/^v//' | cut -d'-' -f1)
          CHAIN=$(echo "$TAG" | sed 's/^v//' | cut -d'-' -f2-)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "chain=${CHAIN:-cardano}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Chain: ${CHAIN:-cardano}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.tag.outputs.tag }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ steps.tag.outputs.tag }}"
            echo "Changelog range: ${RANGE}"
            CHANGES=$(git log --pretty=format:"- %s (%h)" ${RANGE} 2>/dev/null || echo "- Initial release")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          # Write to file for the release body
          cat > /tmp/changelog.md << EOF
          ## Hybrid-Node ${{ steps.tag.outputs.tag }}

          **Chain:** ${{ steps.version.outputs.chain }}
          **Node Version:** ${{ steps.version.outputs.version }}

          ### Changes
          ${CHANGES}

          ### Docker Images
          \`\`\`
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.chain }}
          \`\`\`

          ### Deployment
          \`\`\`bash
          # Helm (K3s)
          helm upgrade hybrid-node ./charts/hybrid-node \\
            --set image.tag=${{ steps.tag.outputs.tag }}

          # Docker
          docker run -d \\
            -e NETWORK=mainnet \\
            -e NODE_MODE=relay \\
            -v cardano-db:/opt/cardano/cnode/db \\
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          \`\`\`
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.chain }}
            type=raw,value=latest

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: platform/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Hybrid-Node ${{ steps.tag.outputs.tag }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'rc') || contains(steps.tag.outputs.tag, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 Release ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Chain:** ${{ steps.version.outputs.chain }}" >> $GITHUB_STEP_SUMMARY
          echo "**Node Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
