name: Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'platform/docker/Dockerfile.*'
      - 'bin/**'
      - 'platform/bin/**'
      - 'chains/**'
      - 'scripts/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/docker/Dockerfile.*'
      - 'bin/**'
      - 'platform/bin/**'
      - 'chains/**'
      - 'scripts/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Test ${{ matrix.chain }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        chain: [cardano, apexfusion]
        include:
          - chain: cardano
            dockerfile: platform/docker/Dockerfile.cardano
            test_network: preprod
          - chain: apexfusion
            dockerfile: platform/docker/Dockerfile.apexfusion
            test_network: afpt

    env:
      TEST_IMAGE: hybrid-node-test-${{ matrix.chain }}:ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.chain }} test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha,scope=${{ matrix.chain }}-test
          cache-to: type=gha,mode=max,scope=${{ matrix.chain }}-test

      - name: Verify image metadata
        run: |
          echo "### ${{ matrix.chain }} Image Inspection" >> $GITHUB_STEP_SUMMARY

          # Verify chain label
          CHAIN_LABEL=$(docker inspect "$TEST_IMAGE" --format '{{index .Config.Labels "org.hybrid-node.chain"}}')
          echo "Chain label: ${CHAIN_LABEL}"
          if [ "${CHAIN_LABEL}" != "${{ matrix.chain }}" ]; then
            echo "::error::Chain label mismatch: expected ${{ matrix.chain }}, got ${CHAIN_LABEL}"
            exit 1
          fi
          echo "✅ Chain label: ${CHAIN_LABEL}"

          # Verify HEALTHCHECK is configured
          HC=$(docker inspect "$TEST_IMAGE" --format '{{.Config.Healthcheck.Test}}')
          if [ -z "$HC" ] || [ "$HC" = "<nil>" ]; then
            echo "::error::HEALTHCHECK not configured in image"
            exit 1
          fi
          echo "✅ HEALTHCHECK configured"

      - name: Verify entrypoint exists
        run: |
          docker run --rm --entrypoint cat "$TEST_IMAGE" /usr/local/bin/entrypoint.sh > /dev/null
          echo "✅ entrypoint.sh present"

      - name: Verify healthcheck script exists
        run: |
          docker run --rm --entrypoint cat "$TEST_IMAGE" /usr/local/bin/healthcheck.sh > /dev/null
          echo "✅ healthcheck.sh present"

      - name: Verify cardano-cli available
        run: |
          VERSION=$(docker run --rm --entrypoint cardano-cli "$TEST_IMAGE" version 2>&1 | head -1)
          echo "✅ cardano-cli: $VERSION"

      - name: Verify cardano-node available
        run: |
          VERSION=$(docker run --rm --entrypoint cardano-node "$TEST_IMAGE" version 2>&1 | head -1)
          echo "✅ cardano-node: $VERSION"

      - name: Smoke test - ${{ matrix.chain }} startup
        run: |
          echo "Starting ${{ matrix.chain }} node container (network=${{ matrix.test_network }})..."
          docker run -d --name test-${{ matrix.chain }} \
            -e NETWORK=${{ matrix.test_network }} \
            -e NODE_MODE=relay \
            -e MITHRIL_DOWNLOAD=N \
            "$TEST_IMAGE"

          echo "Waiting 60s for node initialization..."
          sleep 60

          STATE=$(docker inspect test-${{ matrix.chain }} --format '{{.State.Status}}')
          if [ "$STATE" != "running" ]; then
            echo "::error::Container exited unexpectedly"
            docker logs test-${{ matrix.chain }}
            exit 1
          fi
          echo "✅ ${{ matrix.chain }} container running after 60s"

          docker logs test-${{ matrix.chain }} 2>&1 | tail -30

          echo "### ${{ matrix.chain }} Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Container running (${{ matrix.test_network }}) | ✅ |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker rm -f test-${{ matrix.chain }} 2>/dev/null || true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint entrypoint.sh
        run: |
          # Excluded codes (all intentional patterns in entrypoint.sh):
          #   SC2034 — variables used by sourced Guild scripts
          #   SC2317 — trap handler functions (shellcheck false positive)
          #   SC2016 — single-quoted jq expressions (intentional)
          #   SC1091 — sourced files not present at lint time
          #   SC2030/SC2031 — subshell variable modifications (intentional)
          shellcheck -x -s bash \
            -e SC2034 -e SC2317 -e SC2016 -e SC1091 -e SC2030 -e SC2031 \
            bin/entrypoint.sh

      - name: Lint healthcheck.sh
        run: shellcheck -x -s bash bin/healthcheck.sh

      - name: Lint operator scripts
        run: |
          for f in scripts/health/*.sh; do
            echo "Checking $f..."
            shellcheck -x -s bash "$f"
          done
