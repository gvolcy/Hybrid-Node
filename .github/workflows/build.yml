name: Build and Push Hybrid-Node

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      chain:
        description: 'Target chain (sets defaults for guild/cli)'
        required: true
        default: 'apexfusion'
        type: choice
        options:
          - cardano
          - apexfusion
      node_version:
        description: 'cardano-node version to build'
        required: true
        default: '10.7.0'
      cli_version:
        description: 'cardano-cli version (leave empty for auto)'
        required: false
        default: ''
      guild_account:
        description: 'Guild operators GitHub account (leave empty for auto)'
        required: false
        default: ''
      guild_branch:
        description: 'Guild operators branch (leave empty for auto)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gvolcy/hybrid-node

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        platform: [linux/amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4
        if: contains(matrix.platform, 'arm64')

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NODE_VERSION="${{ github.event.inputs.node_version }}"
            CHAIN="${{ github.event.inputs.chain }}"

            # Set chain-specific defaults
            if [ "$CHAIN" = "cardano" ]; then
              CLI_VERSION="${{ github.event.inputs.cli_version }}"
              [ -z "$CLI_VERSION" ] && CLI_VERSION="10.15.1.0"
              G_ACCOUNT="${{ github.event.inputs.guild_account }}"
              [ -z "$G_ACCOUNT" ] && G_ACCOUNT="cardano-community"
              GUILD_BRANCH="${{ github.event.inputs.guild_branch }}"
              [ -z "$GUILD_BRANCH" ] && GUILD_BRANCH="master"
              GUILD_REPO="guild-operators"
            else
              # ApexFusion defaults
              CLI_VERSION="${{ github.event.inputs.cli_version }}"
              [ -z "$CLI_VERSION" ] && CLI_VERSION="9.4.1.0"
              G_ACCOUNT="${{ github.event.inputs.guild_account }}"
              [ -z "$G_ACCOUNT" ] && G_ACCOUNT="Scitz0"
              GUILD_BRANCH="${{ github.event.inputs.guild_branch }}"
              [ -z "$GUILD_BRANCH" ] && GUILD_BRANCH="main"
            GUILD_REPO="guild-operators-apex"
            fi

            IMAGE_TAG="${NODE_VERSION}-${CHAIN}"
          else
            # Push/PR: build ApexFusion default
            NODE_VERSION="10.1.4"
            CLI_VERSION="9.4.1.0"
            G_ACCOUNT="Scitz0"
            GUILD_BRANCH="main"
            GUILD_REPO="guild-operators-apex"
            CHAIN="apexfusion"
            IMAGE_TAG=""
          fi

          echo "node_version=${NODE_VERSION}" >> $GITHUB_OUTPUT
          echo "cli_version=${CLI_VERSION}" >> $GITHUB_OUTPUT
          echo "g_account=${G_ACCOUNT}" >> $GITHUB_OUTPUT
          echo "guild_branch=${GUILD_BRANCH}" >> $GITHUB_OUTPUT
          echo "guild_repo=${GUILD_REPO}" >> $GITHUB_OUTPUT
          echo "chain=${CHAIN}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          echo "### Build Parameters" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chain | ${CHAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Version | ${NODE_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Version | ${CLI_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Guild Account | ${G_ACCOUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Guild Branch | ${GUILD_BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Guild Repo | ${GUILD_REPO} |" >> $GITHUB_STEP_SUMMARY

      - name: Extract metadata
        id: meta
        if: github.event_name != 'workflow_dispatch'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: platform/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.params.outputs.node_version }}
            ${{ steps.params.outputs.image_tag != '' && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.params.outputs.image_tag) || '' }}
            ${{ github.event_name == 'workflow_dispatch' && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.params.outputs.chain) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.params.outputs.node_version }}
            CLI_VERSION=${{ steps.params.outputs.cli_version }}
            G_ACCOUNT=${{ steps.params.outputs.g_account }}
            GUILD_DEPLOY_BRANCH=${{ steps.params.outputs.guild_branch }}
            GUILD_REPO=${{ steps.params.outputs.guild_repo }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🔀 Hybrid-Node Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Chain:** ${{ steps.params.outputs.chain }}" >> $GITHUB_STEP_SUMMARY
          echo "**cardano-node:** ${{ steps.params.outputs.node_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**cardano-cli:** ${{ steps.params.outputs.cli_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Guild:** ${{ steps.params.outputs.g_account }}/${{ steps.params.outputs.guild_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.params.outputs.node_version }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.params.outputs.image_tag }}" ]; then
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.params.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
