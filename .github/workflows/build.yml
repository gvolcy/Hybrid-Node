name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      chain:
        description: 'Target chain'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cardano
          - apexfusion
      node_version:
        description: 'Override node version (leave empty for default)'
        required: false
        default: ''
      cli_version:
        description: 'Override CLI version (leave empty for default)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gvolcy/hybrid-node

jobs:
  build:
    name: Build ${{ matrix.chain }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        chain: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chain != 'all' && fromJson(format('["{0}"]', github.event.inputs.chain)) || fromJson('["cardano", "apexfusion"]') }}
        include:
          - chain: cardano
            dockerfile: platform/docker/Dockerfile.cardano
            default_node_version: "10.7.1"
            default_cli_version: "10.16.0.0"
          - chain: apexfusion
            dockerfile: platform/docker/Dockerfile.apexfusion
            default_node_version: "10.1.4"
            default_cli_version: "9.4.1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine versions
        id: versions
        run: |
          # Use override if provided via workflow_dispatch, else use matrix default
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.node_version }}" ]; then
            NODE_VERSION="${{ github.event.inputs.node_version }}"
          else
            NODE_VERSION="${{ matrix.default_node_version }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.cli_version }}" ]; then
            CLI_VERSION="${{ github.event.inputs.cli_version }}"
          else
            CLI_VERSION="${{ matrix.default_cli_version }}"
          fi

          echo "node_version=${NODE_VERSION}" >> $GITHUB_OUTPUT
          echo "cli_version=${CLI_VERSION}" >> $GITHUB_OUTPUT
          echo "chain=${{ matrix.chain }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ matrix.chain }}-${NODE_VERSION}" >> $GITHUB_OUTPUT

          echo "### Build: ${{ matrix.chain }}" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chain | ${{ matrix.chain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Version | ${NODE_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Version | ${CLI_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | ${{ matrix.dockerfile }} |" >> $GITHUB_STEP_SUMMARY

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.image_tag }}
            type=raw,value=${{ matrix.chain }},enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.chain }}-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node_version }}
            CLI_VERSION=${{ steps.versions.outputs.cli_version }}
          cache-from: type=gha,scope=${{ matrix.chain }}
          cache-to: type=gha,mode=max,scope=${{ matrix.chain }}

      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
