# Default values for preview-bp
# NOTE: This chart is sanitized for the repo. Host-specific paths and DNS have
# been replaced with placeholders (/data/cardano/..., *.example.com). Override
# them per pool via values-<pool>.yaml before deploying.
replicaCount: 1

image:
  repository: cardanocommunity/cardano-node
  tag: "10.5.3"
  pullPolicy: IfNotPresent

namespace: preview-bp

bp:
  name: preview-bp
  port: 8782
  metricsPort: 12798
  pool: VOLCY

network: preview

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "4Gi"

# Features
features:
  cpuCores: "2"
  mithrilSigner: true
  cncli: true

# Probes configuration
probes:
  liveness:
    initialDelaySeconds: 300
    periodSeconds: 30
    failureThreshold: 5
  readiness:
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3

storage:
  dbPath: ""
  privPath: ""
  mithrilPath: ""
  scriptsPath: ""
  logsPath: ""
  socketsPath: ""
  guildDbPath: ""
  filesPath: ""

nodeSelector: {}

tolerations:
  - key: "node.kubernetes.io/disk-pressure"
    operator: "Exists"
    effect: "NoSchedule"
