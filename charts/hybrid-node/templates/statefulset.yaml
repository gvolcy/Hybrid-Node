apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hybrid-node.fullname" . }}
  labels:
    {{- include "hybrid-node.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hybrid-node.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hybrid-node.selectorLabels" . | nindent 6 }}
  {{- with .Values.strategy }}
  updateStrategy:
    type: {{ .type }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hybrid-node.selectorLabels" . | nindent 8 }}
        network: {{ .Values.cardano.network }}
        mode: {{ .Values.cardano.mode }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hybrid-node.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.hostname }}
      hostname: {{ .Values.hostname }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NETWORK
              value: {{ .Values.cardano.network | quote }}
            - name: NODE_MODE
              value: {{ .Values.cardano.mode | quote }}
            - name: NODE_PORT
              value: {{ .Values.cardano.port | quote }}
            - name: CNODE_PORT
              value: {{ .Values.cardano.port | quote }}
            - name: CPU_CORES
              value: {{ .Values.cardano.cpuCores | quote }}
            {{- if .Values.cardano.rtsOpts }}
            - name: RTS_OPTS
              value: {{ .Values.cardano.rtsOpts | quote }}
            {{- end }}
            - name: MITHRIL_DOWNLOAD
              value: {{ .Values.cardano.mithrilDownload | quote }}
            - name: MITHRIL_SIGNER
              value: {{ .Values.cardano.mithrilSigner | quote }}
            - name: CNCLI_ENABLED
              value: {{ .Values.cardano.cncliEnabled | quote }}
            - name: ENABLE_BACKUP
              value: {{ .Values.cardano.enableBackup | quote }}
            - name: ENABLE_RESTORE
              value: {{ .Values.cardano.enableRestore | quote }}
            {{- if .Values.cardano.customPeers }}
            - name: CUSTOM_PEERS
              value: {{ .Values.cardano.customPeers | quote }}
            {{- end }}
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: {{ .Values.metrics.port | quote }}
            {{- if .Values.pool.name }}
            - name: POOL_NAME
              value: {{ .Values.pool.name | quote }}
            {{- end }}
            {{- if .Values.pool.id }}
            - name: POOL_ID
              value: {{ .Values.pool.id | quote }}
            {{- end }}
            {{- if .Values.pool.ticker }}
            - name: POOL_TICKER
              value: {{ .Values.pool.ticker | quote }}
            {{- end }}
            {{- if .Values.pool.ptApiKey }}
            - name: PT_API_KEY
              value: {{ .Values.pool.ptApiKey | quote }}
            {{- end }}
            {{- if .Values.pool.dir }}
            - name: POOL_DIR
              value: {{ .Values.pool.dir | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: node
              containerPort: {{ .Values.cardano.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.ekg.enabled }}
            - name: ekg
              containerPort: {{ .Values.ekg.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.mithrilMetrics.enabled }}
            - name: mithril
              containerPort: {{ .Values.mithrilMetrics.port }}
              protocol: TCP
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    killall -s SIGINT cardano-node 2>/dev/null || true
                    echo "Sent SIGINT, waiting for clean shutdown..."
                    for i in $(seq 1 280); do
                      [ -f /opt/cardano/cnode/db/clean ] && echo "Clean shutdown confirmed" && exit 0
                      sleep 1
                    done
                    echo "Timeout waiting for clean shutdown"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "/usr/local/bin/healthcheck.sh"
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "/usr/local/bin/healthcheck.sh"
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: db
              mountPath: /opt/cardano/cnode/db
            - name: sockets
              mountPath: /opt/cardano/cnode/sockets
            {{- if or .Values.persistence.guildDb.enabled (and .Values.hostPath.enabled .Values.hostPath.guildDbPath) }}
            - name: guild-db
              mountPath: /opt/cardano/cnode/guild-db
            {{- end }}
            {{- if or .Values.persistence.logs.enabled (and .Values.hostPath.enabled .Values.hostPath.logsPath) }}
            - name: logs
              mountPath: /opt/cardano/cnode/logs
            {{- end }}
            {{- if or .Values.persistence.mithril.enabled (and .Values.hostPath.enabled .Values.hostPath.mithrilPath) }}
            - name: mithril
              mountPath: /opt/cardano/cnode/mithril
            {{- end }}
            {{- if .Values.kesSecret.enabled }}
            - name: kes-keys
              mountPath: /opt/cardano/cnode/priv/pool
              readOnly: true
            {{- end }}
            {{- if and .Values.hostPath.enabled .Values.hostPath.privPath }}
            - name: priv
              mountPath: /opt/cardano/cnode/priv
            {{- end }}
            {{- if and .Values.hostPath.enabled .Values.hostPath.scriptsPath }}
            - name: scripts
              mountPath: /opt/cardano/cnode/scripts
            {{- end }}
            {{- if and .Values.hostPath.enabled .Values.hostPath.filesPath }}
            - name: files
              mountPath: /opt/cardano/cnode/files
            {{- end }}
            {{- if .Values.topologyOverride }}
            - name: topology
              mountPath: /opt/cardano/cnode/files/topology.json
              subPath: topology.json
            {{- end }}
            {{- if .Values.configOverride }}
            - name: config
              mountPath: /opt/cardano/cnode/files/config.json
              subPath: config.json
            {{- end }}
      volumes:
        - name: sockets
          emptyDir: {}
        {{- if .Values.kesSecret.enabled }}
        - name: kes-keys
          secret:
            secretName: {{ .Values.kesSecret.secretName }}
        {{- end }}
        {{- if .Values.topologyOverride }}
        - name: topology
          configMap:
            name: {{ include "hybrid-node.fullname" . }}-topology
        {{- end }}
        {{- if .Values.configOverride }}
        - name: config
          configMap:
            name: {{ include "hybrid-node.fullname" . }}-config
        {{- end }}
        {{- if .Values.hostPath.enabled }}
        {{- if .Values.hostPath.dbPath }}
        - name: db
          hostPath:
            path: {{ .Values.hostPath.dbPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.hostPath.privPath }}
        - name: priv
          hostPath:
            path: {{ .Values.hostPath.privPath }}
            type: Directory
        {{- end }}
        {{- if .Values.hostPath.guildDbPath }}
        - name: guild-db
          hostPath:
            path: {{ .Values.hostPath.guildDbPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.hostPath.logsPath }}
        - name: logs
          hostPath:
            path: {{ .Values.hostPath.logsPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.hostPath.mithrilPath }}
        - name: mithril
          hostPath:
            path: {{ .Values.hostPath.mithrilPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.hostPath.scriptsPath }}
        - name: scripts
          hostPath:
            path: {{ .Values.hostPath.scriptsPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.hostPath.filesPath }}
        - name: files
          hostPath:
            path: {{ .Values.hostPath.filesPath }}
            type: Directory
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.db.enabled (not .Values.hostPath.enabled) }}
  volumeClaimTemplates:
    - metadata:
        name: db
      spec:
        accessModes:
          - {{ .Values.persistence.db.accessMode }}
        {{- if .Values.persistence.db.storageClass }}
        storageClassName: {{ .Values.persistence.db.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.db.size }}
    {{- if .Values.persistence.guildDb.enabled }}
    - metadata:
        name: guild-db
      spec:
        accessModes:
          - {{ .Values.persistence.guildDb.accessMode }}
        {{- if .Values.persistence.guildDb.storageClass }}
        storageClassName: {{ .Values.persistence.guildDb.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.guildDb.size }}
    {{- end }}
    {{- if .Values.persistence.logs.enabled }}
    - metadata:
        name: logs
      spec:
        accessModes:
          - {{ .Values.persistence.logs.accessMode }}
        {{- if .Values.persistence.logs.storageClass }}
        storageClassName: {{ .Values.persistence.logs.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.logs.size }}
    {{- end }}
    {{- if .Values.persistence.mithril.enabled }}
    - metadata:
        name: mithril
      spec:
        accessModes:
          - {{ .Values.persistence.mithril.accessMode }}
        {{- if .Values.persistence.mithril.storageClass }}
        storageClassName: {{ .Values.persistence.mithril.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.mithril.size }}
    {{- end }}
  {{- end }}
