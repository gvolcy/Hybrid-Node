# Example: Cardano Mainnet Relay Node
# Usage: helm install relay ./charts/hybrid-node -f charts/hybrid-node/values-relay-example.yaml

image:
  repository: ghcr.io/gvolcy/hybrid-node
  tag: "10.7.0"

cardano:
  network: mainnet
  mode: relay
  port: 6000
  cpuCores: 4
  mithrilDownload: "Y"    # Fast initial sync via Mithril snapshot
  customPeers: ""          # Add custom peers: "addr1:port1,addr2:port2"

resources:
  requests:
    memory: "12Gi"
    cpu: "4"
  limits:
    memory: "24Gi"
    cpu: "8"

persistence:
  db:
    enabled: true
    size: 120Gi

service:
  type: NodePort
  port: 6000
  # nodePort: 30001       # Uncomment for fixed port

metrics:
  enabled: true
  serviceMonitor:
    enabled: false         # Enable if you have Prometheus Operator
