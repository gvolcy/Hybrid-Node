# Default values for hybrid-node
replicaCount: 1

image:
  repository: ghcr.io/gvolcy/hybrid-node
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-creds
nameOverride: ""
fullnameOverride: ""

# Cardano node configuration
cardano:
  # Network: mainnet, preview, preprod, guild
  network: mainnet
  # Mode: relay or bp
  mode: relay
  # Node port
  port: 6000
  # CPU cores for RTS -N flag
  cpuCores: 2
  # GHC RTS options (CPU_CORES is substituted into -N automatically)
  rtsOpts: ""
  # Enable mithril download on first start
  mithrilDownload: "N"
  # Enable mithril signer (BP mode only)
  mithrilSigner: "N"
  # Enable CNCLI processes (BP mode only: sync, leaderlog, validate)
  cncliEnabled: "N"
  # Custom peers (comma-separated addr:port)
  customPeers: ""
  # Enable DB backup on startup
  enableBackup: "N"
  # Enable DB restore on startup
  enableRestore: "N"

# For BP mode: pool configuration
pool:
  name: ""
  id: ""
  ticker: ""
  # PoolTool.io API key (get from pooltool.io)
  ptApiKey: ""
  # Pool key directory (default: /opt/cardano/cnode/priv/pool/<poolName>)
  dir: ""

# For BP mode: mount KES keys from a K8s secret
kesSecret:
  # Set to true and provide secretName to mount KES keys
  enabled: false
  secretName: ""
  # Keys in the secret: Guild (hot.skey, vrf.skey, op.cert)
  #                  or CoinCashew (kes.skey, vrf.skey, node.cert)

# Additional environment variables
extraEnv: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 6000
  # For relay nodes, you may want NodePort or LoadBalancer
  # type: NodePort
  # nodePort: 30001
  annotations: {}

# Prometheus metrics
metrics:
  enabled: true
  port: 12798
  serviceMonitor:
    enabled: false
    interval: 30s

# EKG monitoring
ekg:
  enabled: false
  port: 12788

# Mithril signer metrics
mithrilMetrics:
  enabled: false
  port: 9090

# Network policy for BP protection (only allow relay IPs)
networkPolicy:
  enabled: false
  # List of relay IP CIDRs allowed to connect to BP
  allowedRelayCIDRs: []
    # - 1.2.3.4/32      # relay1 IP
    # - 5.6.7.8/32      # relay2 IP
  # Allow cluster-internal traffic
  allowClusterTraffic: true

# Mithril-keeper CronJob (restarts mithril-signer if it crashes)
mithrilKeeper:
  enabled: false
  schedule: "*/5 * * * *"
  image: bitnami/kubectl:latest

persistence:
  # Database storage
  db:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 100Gi
    existingClaim: ""
  # Guild-DB storage (cncli database, logs)
  guildDb:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    existingClaim: ""
  # Logs storage
  logs:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""
  # Mithril data
  mithril:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    existingClaim: ""

# Use hostPath instead of PVC (for K3s single-node setups)
hostPath:
  enabled: false
  dbPath: ""
  privPath: ""
  guildDbPath: ""
  logsPath: ""
  socketsPath: ""
  mithrilPath: ""
  scriptsPath: ""
  filesPath: ""
  # Example: /data/cardano/relay1/db

resources:
  requests:
    memory: "8Gi"
    cpu: "2"
  limits:
    memory: "24Gi"
    cpu: "4"

nodeSelector: {}

tolerations:
  - key: node.kubernetes.io/disk-pressure
    operator: Exists
    effect: NoSchedule

affinity: {}

# Topology config override (raw JSON)
topologyOverride: ""

# Config override (raw JSON)
configOverride: ""

# Pod hostname (useful for log identification)
hostname: ""

# Deployment strategy (Recreate is required — two nodes can't share the same DB)
strategy:
  type: Recreate

# Graceful shutdown timeout (cardano-node needs up to 300s)
terminationGracePeriodSeconds: 300

# Liveness probe configuration
livenessProbe:
  initialDelaySeconds: 3600
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 5

# Readiness probe configuration
readinessProbe:
  initialDelaySeconds: 600
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 10
