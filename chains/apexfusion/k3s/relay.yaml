# ============================================================================
# Hybrid-Node ApexFusion Mainnet (AFPM) Relay for K3s
# Features: preStop graceful shutdown, socket-based probes, selfheal CronJob,
#           disk-pressure toleration, all persistent volumes
# Deploy: main3 (apexR1), main4 (apexR2), main5 (apexR3)
# ============================================================================
# Usage:
#   1. Edit POOL_NAME + hostPath base + hostPort per relay instance
#   2. kubectl apply -f apex-relay.yaml
#
# Per-relay customization:
#   apexR1 (main3): hostPort=4550, POOL_NAME=apexR1, paths=.../apexR1/
#   apexR2 (main4): hostPort=4551, POOL_NAME=apexR2, paths=.../apexR2/
#   apexR3 (main5): hostPort=4552, POOL_NAME=apexR3, paths=.../apexR3/
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: relay-apexfusion-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apexr1-apexfusion-node
  namespace: relay-apexfusion-1
  labels:
    app: apexr1-apexfusion-node
    network: afpm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: apexr1-apexfusion-node
  template:
    metadata:
      labels:
        app: apexr1-apexfusion-node
        network: afpm
    spec:
      hostname: apexr1
      imagePullSecrets:
        - name: ghcr-creds
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cardano-node
          image: ghcr.io/gvolcy/hybrid-node:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NETWORK
              value: "afpm"
            - name: NODE_MODE
              value: "relay"
            - name: NODE_PORT
              value: "4550"
            - name: CNODE_PORT
              value: "4550"
            - name: POOL_NAME
              value: "apexR1"
            - name: UPDATE_CHECK
              value: "N"
            - name: CPU_CORES
              value: "2"
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: "12798"
          ports:
            - containerPort: 4550
              hostPort: 4550
              name: node
              protocol: TCP
            - containerPort: 12798
              name: prometheus
              protocol: TCP
            - containerPort: 12788
              name: ekg
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    killall -s SIGINT cardano-node 2>/dev/null || true
                    echo "Sent SIGINT, waiting for clean shutdown..."
                    for i in $(seq 1 280); do
                      [ -f /opt/cardano/cnode/db/clean ] && echo "Clean shutdown confirmed" && exit 0
                      sleep 1
                    done
                    echo "Timeout waiting for clean shutdown"
          startupProbe:
            exec:
              command: ["test", "-S", "/opt/cardano/cnode/sockets/node.socket"]
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 2880    # 24 hours grace for initial sync
          livenessProbe:
            exec:
              command: ["test", "-S", "/opt/cardano/cnode/sockets/node.socket"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: node
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - mountPath: /opt/cardano/cnode/db
              name: db
            - mountPath: /opt/cardano/cnode/priv
              name: priv
            - mountPath: /opt/cardano/cnode/logs
              name: logs
            - mountPath: /opt/cardano/cnode/sockets
              name: sockets
            - mountPath: /opt/cardano/cnode/guild-db
              name: guild-db
            - mountPath: /opt/cardano/cnode/files
              name: files
      volumes:
        - name: db
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/db
            type: DirectoryOrCreate
        - name: priv
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/priv
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/logs
            type: DirectoryOrCreate
        - name: sockets
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/sockets
            type: DirectoryOrCreate
        - name: guild-db
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/guild-db
            type: DirectoryOrCreate
        - name: files
          hostPath:
            path: /home/main2/blockchain-nodes/apexfusion/afpm-relay/apexR1/files
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: apexr1-apexfusion-service
  namespace: relay-apexfusion-1
spec:
  type: NodePort
  ports:
    - port: 4550
      targetPort: 4550
      name: node
    - port: 12798
      targetPort: 12798
      name: prometheus
  selector:
    app: apexr1-apexfusion-node
---
# ============================================================================
# Selfheal CronJob: restarts relay if node stops responding
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apexr1-selfheal
  namespace: relay-apexfusion-1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apexr1-selfheal
  namespace: relay-apexfusion-1
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apexr1-selfheal
  namespace: relay-apexfusion-1
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apexr1-selfheal
subjects:
  - kind: ServiceAccount
    name: apexr1-selfheal
    namespace: relay-apexfusion-1
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: apexr1-selfheal
  namespace: relay-apexfusion-1
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: apexr1-selfheal
          restartPolicy: OnFailure
          containers:
            - name: selfheal
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  DEPLOY="apexr1-apexfusion-node"
                  NS="relay-apexfusion-1"
                  MIN_AGE=86400
                  PROM_PORT=12798
                  POD=$(kubectl get pods -n $NS -l app=$DEPLOY -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$POD" ]; then
                    echo "No pod found, restarting deployment"
                    kubectl rollout restart deployment/$DEPLOY -n $NS
                    exit 0
                  fi
                  START=$(kubectl get pod -n $NS $POD -o jsonpath='{.status.startTime}' 2>/dev/null)
                  if [ -n "$START" ]; then
                    START_EPOCH=$(date -d "$START" +%s 2>/dev/null)
                    NOW_EPOCH=$(date +%s)
                    AGE=$(( NOW_EPOCH - START_EPOCH ))
                    if [ "$AGE" -lt "$MIN_AGE" ]; then
                      echo "Pod age ${AGE}s < MIN_AGE ${MIN_AGE}s, skipping (may still be syncing)"
                      exit 0
                    fi
                  fi
                  SYNC=$(kubectl exec -n $NS $POD -- curl -s localhost:${PROM_PORT}/metrics 2>/dev/null | grep 'cardano_node_metrics_density_real' | awk '{print $2}')
                  if [ -z "$SYNC" ] || [ "$SYNC" == "0" ]; then
                    echo "Node not responding or stuck (density=${SYNC:-null}), age=${AGE}s, restarting"
                    kubectl rollout restart deployment/$DEPLOY -n $NS
                  else
                    echo "Node healthy: density=$SYNC age=${AGE}s"
                  fi
