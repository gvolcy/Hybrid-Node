# ============================================================================
# leiosT1 — Leios / Musashi Dojo relay on K3s (main3)
# Uses the official IOG prebuilt Leios testnet relay image, which bakes in the
# pinned cardano-playground configs (incl. dijkstra genesis + peer snapshot)
# and runs cardano-node as a non-block-producing relay against the public
# bootstrap peer leios-node.play.dev.cardano.org:3001 (network magic 164).
#
#   image: ghcr.io/input-output-hk/ouroboros-leios/cardano-node-testnet:latest
#   run-node.sh -> cardano-node run --config config.json --port 3010 \
#                  --topology topology.json --database-path db \
#                  --socket-path node.socket   (all under WORKING_DIR=/data)
#
# K8s names must be lowercase, so the resources are "leiost1" (= leiosT1).
# Apply:  kubectl apply -f leiost1.yaml
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: leiost1
  labels:
    network: leios
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leiost1
  namespace: leiost1
  labels:
    app: leiost1
    network: leios
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: leiost1
  template:
    metadata:
      labels:
        app: leiost1
        network: leios
    spec:
      hostname: leiost1
      terminationGracePeriodSeconds: 120
      containers:
        - name: cardano-node
          image: ghcr.io/input-output-hk/ouroboros-leios/cardano-node-testnet:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKING_DIR
              value: "/data"
            - name: PORT
              value: "3010"
            - name: HOST_ADDR
              value: "0.0.0.0"
            - name: CARDANO_NODE_NETWORK_ID
              value: "164"
            - name: CARDANO_NODE_SOCKET_PATH
              value: "/data/node.socket"
          ports:
            - containerPort: 3010
              hostPort: 3010
              name: p2p
              protocol: TCP
          # P2P responder port only opens after initial chunk validation /
          # ledger replay. Leios testnet is small, so this is quick, but keep a
          # generous startup grace so the pod isn't killed mid-replay.
          startupProbe:
            tcpSocket:
              port: p2p
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 240
          livenessProbe:
            tcpSocket:
              port: p2p
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: p2p
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          hostPath:
            path: /data/leios/leiost1
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: leiost1
  namespace: leiost1
  labels:
    app: leiost1
spec:
  type: ClusterIP
  ports:
    - port: 3010
      targetPort: 3010
      name: p2p
  selector:
    app: leiost1
