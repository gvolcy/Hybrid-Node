# ============================================================================
# leiosT3 — Leios / Musashi Dojo relay on K3s (main5) — Option B (Hybrid-Node)
# Image: ghcr.io/gvolcy/hybrid-node:leios-11.0.1
# Tailscale: 100.125.176.60:3010
# Apply:  kubectl apply -f leiost3.yaml
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: leiost3
  labels:
    network: leios
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leiost3
  namespace: leiost3
  labels:
    app: leiost3
    network: leios
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: leiost3
  template:
    metadata:
      labels:
        app: leiost3
        network: leios
    spec:
      hostname: leiost3
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: cardano-node
          image: ghcr.io/gvolcy/hybrid-node:leios-11.0.1
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/entrypoint.sh"]
          env:
            - name: NETWORK
              value: "leios"
            - name: NODE_MODE
              value: "relay"
            - name: NODE_PORT
              value: "3010"
            - name: CNODE_PORT
              value: "3010"
            - name: MITHRIL_DOWNLOAD
              value: "N"
            - name: UPDATE_CHECK
              value: "N"
            - name: CPU_CORES
              value: "4"
            - name: CARDANO_NODE_NETWORK_ID
              value: "164"
            - name: CARDANO_NODE_SOCKET_PATH
              value: "/opt/cardano/cnode/sockets/node.socket"
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: "12798"
          ports:
            - containerPort: 3010
              hostPort: 3010
              name: p2p
              protocol: TCP
            - containerPort: 12798
              name: prometheus
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    killall -s SIGINT cardano-node 2>/dev/null || true
                    for i in $(seq 1 280); do
                      [ -f /opt/cardano/cnode/db/clean ] && exit 0
                      sleep 1
                    done
          startupProbe:
            tcpSocket:
              port: p2p
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 240
          livenessProbe:
            exec:
              command: ["/bin/bash", "/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            exec:
              command: ["/bin/bash", "/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - mountPath: /opt/cardano/cnode/db
              name: db
            - mountPath: /opt/cardano/cnode/files
              name: files
            - mountPath: /opt/cardano/cnode/sockets
              name: sockets
            - mountPath: /opt/cardano/cnode/logs
              name: logs
            - mountPath: /opt/cardano/cnode/guild-db
              name: guild-db
      volumes:
        - name: db
          hostPath:
            path: /data/leios/leiost3/db
            type: DirectoryOrCreate
        - name: files
          hostPath:
            path: /data/leios/leiost3/files
            type: DirectoryOrCreate
        - name: sockets
          hostPath:
            path: /data/leios/leiost3/sockets
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /data/leios/leiost3/logs
            type: DirectoryOrCreate
        - name: guild-db
          hostPath:
            path: /data/leios/leiost3/guild-db
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: leiost3
  namespace: leiost3
  labels:
    app: leiost3
spec:
  type: ClusterIP
  ports:
    - port: 3010
      targetPort: 3010
      name: p2p
  selector:
    app: leiost3
