# ============================================================================
# leios-silem — Leios / Musashi Dojo Block Producer on K3s (main2)
# Option B (Hybrid-Node): ghcr.io/gvolcy/hybrid-node:leios-11.1.0
# EB-connected topology: BOOTSTRAP_PEERS (public Leios relay) + CUSTOM_PEERS
# (leiosT1/T2/T3 :3010 localRoots) + USE_LEDGER_AFTER_SLOT. A Leios BP MUST have
# a bootstrap peer or it is EB-starved and crashes with Issue #890.
# (Requires the entrypoint that honours BOOTSTRAP_PEERS/USE_LEDGER_AFTER_SLOT;
#  rebuild the image or apply Dockerfile.entrypoint-overlay.)
# Keys: /data/leios/leios-silem/priv  |  Wallet: /data/leios/leios-silem/wallet
# Apply: kubectl apply -f leios-silem.yaml
#
# Issue #890 (LeiosCert replay): a fresh sync gets poisoned; RECOVER by seeding
# the db from the healthy relay:  chains/leios/bin/leios-bp-seed-from-relay leios-silem
# At 100%: chains/leios/bin/leios-bp-enable-forging leios-silem  (SIGHUP, no restart)
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: leios-silem
  labels:
    network: leios
    role: bp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leios-silem
  namespace: leios-silem
  labels:
    app: leios-silem
    network: leios
    role: bp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: leios-silem
  template:
    metadata:
      labels:
        app: leios-silem
        network: leios
        role: bp
    spec:
      hostname: leios-silem
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: cardano-node
          image: ghcr.io/gvolcy/hybrid-node:leios-11.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - LINUX_IMMUTABLE
          command: ["/usr/local/bin/entrypoint.sh"]
          env:
            - name: NETWORK
              value: "leios"
            - name: NODE_MODE
              value: "bp"
            - name: NODE_PORT
              value: "6001"
            - name: CNODE_PORT
              value: "6001"
            - name: POOL_DIR
              value: "/opt/cardano/cnode/priv/pool"
            - name: CUSTOM_PEERS
              value: "100.103.135.9:3010,100.110.37.42:3010,100.125.176.60:3010"
            - name: BOOTSTRAP_PEERS
              value: "leios-node.play.dev.cardano.org:3001"
            - name: USE_LEDGER_AFTER_SLOT
              value: "1000"
            - name: START_AS_NON_PRODUCING
              value: "true"
            - name: MITHRIL_DOWNLOAD
              value: "N"
            - name: UPDATE_CHECK
              value: "N"
            - name: CPU_CORES
              value: "2"
            - name: CARDANO_NODE_NETWORK_ID
              value: "164"
            - name: CARDANO_NODE_SOCKET_PATH
              value: "/opt/cardano/cnode/sockets/node.socket"
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: "12798"
          ports:
            - containerPort: 6001
              hostPort: 6001
              name: bp
              protocol: TCP
            - containerPort: 12798
              name: prometheus
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: bp
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 240
          readinessProbe:
            exec:
              command: ["/bin/bash", "/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 60
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - mountPath: /opt/cardano/cnode/db
              name: db
            - mountPath: /opt/cardano/cnode/files
              name: files
            - mountPath: /opt/cardano/cnode/sockets
              name: sockets
            - mountPath: /opt/cardano/cnode/logs
              name: logs
            - mountPath: /opt/cardano/cnode/guild-db
              name: guild-db
            - mountPath: /opt/cardano/cnode/priv/pool
              name: pool-keys
            - mountPath: /opt/cardano/cnode/priv/wallet/silem
              name: wallet
      volumes:
        - name: db
          hostPath:
            path: /data/leios/leios-silem/data/db
            type: DirectoryOrCreate
        - name: files
          hostPath:
            path: /data/leios/leios-silem/data/files
            type: DirectoryOrCreate
        - name: sockets
          hostPath:
            path: /data/leios/leios-silem/data/sockets
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /data/leios/leios-silem/data/logs
            type: DirectoryOrCreate
        - name: guild-db
          hostPath:
            path: /data/leios/leios-silem/data/guild-db
            type: DirectoryOrCreate
        - name: pool-keys
          hostPath:
            path: /data/leios/leios-silem/priv
            type: Directory
        - name: wallet
          hostPath:
            path: /data/leios/leios-silem/wallet
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: leios-silem
  namespace: leios-silem
  labels:
    app: leios-silem
spec:
  type: ClusterIP
  ports:
    - port: 6001
      targetPort: 6001
      name: bp
  selector:
    app: leios-silem
