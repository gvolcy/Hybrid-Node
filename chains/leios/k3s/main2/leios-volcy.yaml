# ============================================================================
# leios-volcy — Leios / Musashi Dojo Block Producer on K3s (main2)
# Option B (Hybrid-Node): ghcr.io/gvolcy/hybrid-node:leios-11.0.1
# Private topology via CUSTOM_PEERS -> leiosT1/leiosT2 (Tailscale :3010).
# Keys: /data/leios/leios-volcy/priv  |  Wallet: /data/leios/leios-volcy/wallet
# Apply: kubectl apply -f leios-volcy.yaml
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: leios-volcy
  labels:
    network: leios
    role: bp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leios-volcy
  namespace: leios-volcy
  labels:
    app: leios-volcy
    network: leios
    role: bp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: leios-volcy
  template:
    metadata:
      labels:
        app: leios-volcy
        network: leios
        role: bp
    spec:
      hostname: leios-volcy
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: cardano-node
          image: ghcr.io/gvolcy/hybrid-node:leios-11.0.1
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/entrypoint.sh"]
          env:
            - name: NETWORK
              value: "leios"
            - name: NODE_MODE
              value: "bp"
            - name: NODE_PORT
              value: "6000"
            - name: CNODE_PORT
              value: "6000"
            - name: POOL_DIR
              value: "/opt/cardano/cnode/priv/pool"
            - name: CUSTOM_PEERS
              value: "100.103.135.9:3010,100.110.37.42:3010"
            - name: MITHRIL_DOWNLOAD
              value: "N"
            - name: UPDATE_CHECK
              value: "N"
            - name: CPU_CORES
              value: "2"
            - name: CARDANO_NODE_NETWORK_ID
              value: "164"
            - name: CARDANO_NODE_SOCKET_PATH
              value: "/opt/cardano/cnode/sockets/node.socket"
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: "12798"
          ports:
            - containerPort: 6000
              hostPort: 6000
              name: bp
              protocol: TCP
            - containerPort: 12798
              name: prometheus
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: bp
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 240
          livenessProbe:
            exec:
              command: ["/bin/bash", "/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            exec:
              command: ["/bin/bash", "/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - mountPath: /opt/cardano/cnode/db
              name: db
            - mountPath: /opt/cardano/cnode/files
              name: files
            - mountPath: /opt/cardano/cnode/sockets
              name: sockets
            - mountPath: /opt/cardano/cnode/logs
              name: logs
            - mountPath: /opt/cardano/cnode/guild-db
              name: guild-db
            - mountPath: /opt/cardano/cnode/priv/pool
              name: pool-keys
              readOnly: true
            - mountPath: /wallet
              name: wallet
              readOnly: true
      volumes:
        - name: db
          hostPath:
            path: /data/leios/leios-volcy/data/db
            type: DirectoryOrCreate
        - name: files
          hostPath:
            path: /data/leios/leios-volcy/data/files
            type: DirectoryOrCreate
        - name: sockets
          hostPath:
            path: /data/leios/leios-volcy/data/sockets
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /data/leios/leios-volcy/data/logs
            type: DirectoryOrCreate
        - name: guild-db
          hostPath:
            path: /data/leios/leios-volcy/data/guild-db
            type: DirectoryOrCreate
        - name: pool-keys
          hostPath:
            path: /data/leios/leios-volcy/priv
            type: Directory
        - name: wallet
          hostPath:
            path: /data/leios/leios-volcy/wallet
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: leios-volcy
  namespace: leios-volcy
  labels:
    app: leios-volcy
spec:
  type: ClusterIP
  ports:
    - port: 6000
      targetPort: 6000
      name: bp
  selector:
    app: leios-volcy
