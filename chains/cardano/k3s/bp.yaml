# ============================================================================
# Hybrid-Node Block Producer for K3s
# Features: preStop graceful shutdown, NetworkPolicy, mithril-keeper, CNCLI,
#           PoolTool.io, all persistent volumes, disk-pressure toleration
# ============================================================================
# Usage:
#   1. Create namespace:  kubectl create ns my-bp
#   2. Create KES secret: kubectl -n my-bp create secret generic bp-kes-keys \
#        --from-file=hot.skey --from-file=vrf.skey --from-file=op.cert
#   3. Edit env vars below (POOL_NAME, POOL_ID, PT_API_KEY, etc.)
#   4. kubectl apply -f bp.yaml
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: cardano-bp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cardano-bp
  namespace: cardano-bp
---
# RBAC for mithril-keeper CronJob
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cardano-bp-mithril-keeper
  namespace: cardano-bp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cardano-bp-mithril-keeper
  namespace: cardano-bp
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cardano-bp-mithril-keeper
  namespace: cardano-bp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cardano-bp-mithril-keeper
subjects:
  - kind: ServiceAccount
    name: cardano-bp-mithril-keeper
    namespace: cardano-bp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardano-bp
  namespace: cardano-bp
  labels:
    app: cardano-bp
    network: mainnet
    pool: CHANGE_ME
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cardano-bp
  template:
    metadata:
      labels:
        app: cardano-bp
        network: mainnet
        pool: CHANGE_ME
    spec:
      serviceAccountName: cardano-bp
      hostname: cardano-bp
      imagePullSecrets:
        - name: ghcr-creds
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup: 1000  # WARNING: causes VRF key permission errors
        fsGroupChangePolicy: OnRootMismatch
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      # Fix VRF key permissions — K8s fsGroup adds group bits that
      # cardano-node rejects (GroupPermissionsExist error)
      initContainers:
        - name: fix-key-perms
          image: busybox:latest
          command:
            - /bin/sh
            - -c
            - |
              POOL_NAME="${POOL_NAME}"
              POOL_DIR="/data/priv/pool/${POOL_NAME}"
              if [ -d "$POOL_DIR" ]; then
                chmod 0600 "$POOL_DIR"/*.skey "$POOL_DIR"/op.cert 2>/dev/null || true
                echo "Fixed key permissions in $POOL_DIR"
              else
                echo "Pool dir $POOL_DIR not found, skipping"
              fi
          env:
            - name: POOL_NAME
              value: "CHANGE_ME"
          volumeMounts:
            - mountPath: /data/priv
              name: priv
      containers:
        - name: cardano-node
          image: ghcr.io/gvolcy/hybrid-node:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NETWORK
              value: "mainnet"
            - name: NODE_MODE
              value: "bp"
            - name: NODE_PORT
              value: "6000"
            - name: CNODE_PORT
              value: "6000"
            - name: CPU_CORES
              value: "4"
            - name: POOL_NAME
              value: "CHANGE_ME"
            - name: POOL_ID
              value: "CHANGE_ME"
            - name: POOL_TICKER
              value: "CHANGE_ME"
            - name: PT_API_KEY
              value: ""
            - name: CARDANO_BLOCK_PRODUCER
              value: "true"
            - name: MITHRIL_SIGNER
              value: "Y"
            - name: CNCLI_ENABLED
              value: "Y"
            - name: EKG_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: "12798"
          ports:
            - containerPort: 6000
              hostPort: 6000
              name: cardano
              protocol: TCP
            - containerPort: 12798
              name: prometheus
              protocol: TCP
            - containerPort: 12788
              name: ekg
              protocol: TCP
            - containerPort: 9090
              name: mithril
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    killall -s SIGINT cardano-node 2>/dev/null || true
                    echo "Sent SIGINT, waiting for clean shutdown..."
                    for i in $(seq 1 280); do
                      [ -f /opt/cardano/cnode/db/clean ] && echo "Clean shutdown confirmed" && exit 0
                      sleep 1
                    done
                    echo "Timeout waiting for clean shutdown"
          startupProbe:
            exec:
              command: ["test", "-S", "/opt/cardano/cnode/sockets/node.socket"]
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 2880    # 24 hours grace for initial sync
          livenessProbe:
            exec:
              command: ["test", "-S", "/opt/cardano/cnode/sockets/node.socket"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: 6000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "24Gi"
          volumeMounts:
            - mountPath: /opt/cardano/cnode/db
              name: db
            - mountPath: /opt/cardano/cnode/priv
              name: priv
            - mountPath: /opt/cardano/cnode/mithril
              name: mithril
            - mountPath: /opt/cardano/cnode/scripts
              name: scripts
            - mountPath: /opt/cardano/cnode/logs
              name: logs
            - mountPath: /opt/cardano/cnode/sockets
              name: sockets
            - mountPath: /opt/cardano/cnode/guild-db
              name: guild-db
            - mountPath: /opt/cardano/cnode/files
              name: files
      volumes:
        - name: db
          hostPath:
            path: /data/cardano/bp/db
            type: DirectoryOrCreate
        - name: priv
          hostPath:
            path: /data/cardano/bp/priv
            type: Directory
        - name: mithril
          hostPath:
            path: /data/cardano/bp/mithril
            type: DirectoryOrCreate
        - name: scripts
          hostPath:
            path: /data/cardano/bp/scripts
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /data/cardano/bp/logs
            type: DirectoryOrCreate
        - name: sockets
          hostPath:
            path: /data/cardano/bp/sockets
            type: DirectoryOrCreate
        - name: guild-db
          hostPath:
            path: /data/cardano/bp/guild-db
            type: DirectoryOrCreate
        - name: files
          hostPath:
            path: /data/cardano/bp/files
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: cardano-bp-service
  namespace: cardano-bp
spec:
  type: ClusterIP  # BPs must not expose NodePort to the network
  ports:
    - port: 6000
      targetPort: 6000
      name: cardano
    - port: 12798
      targetPort: 12798
      name: prometheus
    - port: 9090
      targetPort: 9090
      name: mithril
  selector:
    app: cardano-bp
---
# NetworkPolicy: only allow relay IPs to connect to BP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bp-relay-only
  namespace: cardano-bp
spec:
  podSelector:
    matchLabels:
      app: cardano-bp
  policyTypes:
    - Ingress
  ingress:
    # CHANGE THESE to your relay public IPs
    - from:
        - ipBlock:
            cidr: 1.2.3.4/32  # relay1 IP
      ports:
        - port: 6000
          protocol: TCP
    - from:
        - ipBlock:
            cidr: 5.6.7.8/32  # relay2 IP
      ports:
        - port: 6000
          protocol: TCP
    # Allow K3s cluster-internal traffic
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
    - from:
        - ipBlock:
            cidr: 10.43.0.0/16
    - from:
        - ipBlock:
            cidr: 127.0.0.0/8
---
# Mithril-keeper: restarts mithril-signer if it crashes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cardano-bp-mithril-keeper
  namespace: cardano-bp
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 240
      template:
        spec:
          serviceAccountName: cardano-bp-mithril-keeper
          restartPolicy: Never
          containers:
            - name: mithril-keeper
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  POD=$(kubectl get pods -n cardano-bp -l app=cardano-bp -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [[ -z "$POD" ]]; then
                    echo "No pod found for cardano-bp"
                    exit 0
                  fi

                  RUNNING=$(kubectl exec -n cardano-bp "$POD" -- bash -c 'ps -eo pid,stat,args | grep -v " Z " | grep -v grep | grep "mithril-signer" | wc -l' 2>/dev/null || echo "0")
                  if [[ "$RUNNING" -gt 0 ]]; then
                    echo "Mithril signer already running in $POD"
                    exit 0
                  fi

                  if ! kubectl exec -n cardano-bp "$POD" -- test -S /opt/cardano/cnode/sockets/node.socket; then
                    echo "Node socket not ready yet in $POD"
                    exit 0
                  fi

                  echo "Starting mithril signer in $POD..."
                  if kubectl exec -n cardano-bp "$POD" -- test -f /opt/cardano/cnode/mithril/autostart.sh; then
                    kubectl exec -n cardano-bp "$POD" -- bash /opt/cardano/cnode/mithril/autostart.sh start
                  elif kubectl exec -n cardano-bp "$POD" -- test -x /opt/cardano/cnode/scripts/mithril-signer.sh; then
                    kubectl exec -n cardano-bp "$POD" -- bash /opt/cardano/cnode/scripts/mithril-signer.sh start
                  fi
                  echo "Mithril signer started in $POD"
---
# ============================================================================
# Selfheal CronJob: restarts BP if node stops responding
# Uses the same ServiceAccount as mithril-keeper (needs pods/exec)
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cardano-bp-selfheal
  namespace: cardano-bp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cardano-bp-selfheal
  namespace: cardano-bp
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cardano-bp-selfheal
  namespace: cardano-bp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cardano-bp-selfheal
subjects:
  - kind: ServiceAccount
    name: cardano-bp-selfheal
    namespace: cardano-bp
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cardano-bp-selfheal
  namespace: cardano-bp
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: cardano-bp-selfheal
          restartPolicy: OnFailure
          containers:
            - name: selfheal
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  DEPLOY="cardano-bp"
                  NS="cardano-bp"
                  MIN_AGE=86400
                  PROM_PORT=12798
                  POD=$(kubectl get pods -n $NS -l app=$DEPLOY -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$POD" ]; then
                    echo "No pod found, restarting deployment"
                    kubectl rollout restart deployment/$DEPLOY -n $NS
                    exit 0
                  fi
                  START=$(kubectl get pod -n $NS $POD -o jsonpath='{.status.startTime}' 2>/dev/null)
                  if [ -n "$START" ]; then
                    START_EPOCH=$(date -d "$START" +%s 2>/dev/null)
                    NOW_EPOCH=$(date +%s)
                    AGE=$(( NOW_EPOCH - START_EPOCH ))
                    if [ "$AGE" -lt "$MIN_AGE" ]; then
                      echo "Pod age ${AGE}s < MIN_AGE ${MIN_AGE}s, skipping (may still be syncing)"
                      exit 0
                    fi
                  fi
                  SYNC=$(kubectl exec -n $NS $POD -- curl -s localhost:${PROM_PORT}/metrics 2>/dev/null | grep 'cardano_node_metrics_density_real' | awk '{print $2}')
                  if [ -z "$SYNC" ] || [ "$SYNC" == "0" ]; then
                    echo "Node not responding or stuck (density=${SYNC:-null}), age=${AGE}s, restarting"
                    kubectl rollout restart deployment/$DEPLOY -n $NS
                  else
                    echo "Node healthy: density=$SYNC age=${AGE}s"
                  fi
---
# ============================================================================
# KES Expiry Monitor: warns when KES key is close to expiring (BP only)
# Runs daily, exits 1 if remaining periods <= threshold
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cardano-bp-kes-monitor
  namespace: cardano-bp
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: cardano-bp-selfheal
          restartPolicy: OnFailure
          containers:
            - name: kes-monitor
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  DEPLOY="cardano-bp"
                  NS="cardano-bp"
                  PROM_PORT=12798
                  KES_WARN_THRESHOLD=10
                  POD=$(kubectl get pods -n $NS -l app=$DEPLOY -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$POD" ]; then
                    echo "ERROR: No running BP pod found!"
                    exit 1
                  fi
                  REMAINING=$(kubectl exec -n $NS $POD -- curl -s localhost:${PROM_PORT}/metrics 2>/dev/null | grep 'cardano_node_metrics_remainingKESPeriods_int' | awk '{print $2}')
                  CURRENT=$(kubectl exec -n $NS $POD -- curl -s localhost:${PROM_PORT}/metrics 2>/dev/null | grep 'cardano_node_metrics_currentKESPeriod_int' | awk '{print $2}')
                  EXPIRY=$(kubectl exec -n $NS $POD -- curl -s localhost:${PROM_PORT}/metrics 2>/dev/null | grep 'cardano_node_metrics_operationalCertificateExpiryKESPeriod_int' | awk '{print $2}')
                  DAYS_LEFT=$(( REMAINING * 129600 / 86400 ))
                  echo "=== KES Status: $DEPLOY ==="
                  echo "Current KES Period: $CURRENT"
                  echo "Expiry KES Period:  $EXPIRY"
                  echo "Remaining Periods:  $REMAINING"
                  echo "Approx Days Left:   $DAYS_LEFT"
                  echo "=========================="
                  if [ -z "$REMAINING" ]; then
                    echo "CRITICAL: Could not read KES metrics!"
                    exit 1
                  fi
                  if [ "$REMAINING" -le "$KES_WARN_THRESHOLD" ]; then
                    echo "WARNING: KES key expires in $REMAINING periods (~${DAYS_LEFT} days)! ROTATE NOW!"
                    exit 1
                  fi
                  echo "OK: KES key healthy with $REMAINING periods (~${DAYS_LEFT} days) remaining"
---
# ============================================================================
# DB Snapshot: weekly backup of the Cardano DB (BP only)
# Tars the DB directory and stores on host, keeps last 2 snapshots
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cardano-bp-db-snapshot
  namespace: cardano-bp
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      template:
        spec:
          serviceAccountName: cardano-bp-selfheal
          restartPolicy: OnFailure
          containers:
            - name: db-snapshot
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  DEPLOY="cardano-bp"
                  NS="cardano-bp"
                  SNAPSHOT_DIR="/snapshots"
                  MAX_SNAPSHOTS=2
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  echo "=== DB Snapshot: $DEPLOY @ $TIMESTAMP ==="

                  POD=$(kubectl get pods -n $NS -l app=$DEPLOY -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$POD" ]; then
                    echo "ERROR: No running BP pod found!"
                    exit 1
                  fi

                  DB_SIZE=$(kubectl exec -n $NS $POD -- du -sh /opt/cardano/cnode/db 2>/dev/null | awk '{print $1}')
                  echo "Current DB size: $DB_SIZE"

                  echo "Creating snapshot..."
                  kubectl exec -n $NS $POD -- tar czf - /opt/cardano/cnode/db 2>/dev/null > ${SNAPSHOT_DIR}/db-${DEPLOY}-${TIMESTAMP}.tar.gz

                  if [ $? -eq 0 ]; then
                    SNAP_SIZE=$(du -sh ${SNAPSHOT_DIR}/db-${DEPLOY}-${TIMESTAMP}.tar.gz | awk '{print $1}')
                    echo "Snapshot created: db-${DEPLOY}-${TIMESTAMP}.tar.gz ($SNAP_SIZE)"
                  else
                    echo "ERROR: Snapshot failed!"
                    exit 1
                  fi

                  cd ${SNAPSHOT_DIR}
                  ls -t db-${DEPLOY}-*.tar.gz 2>/dev/null | tail -n +$((MAX_SNAPSHOTS + 1)) | xargs -r rm -v
                  echo "Snapshot complete. Remaining snapshots:"
                  ls -lh ${SNAPSHOT_DIR}/db-${DEPLOY}-*.tar.gz 2>/dev/null
              volumeMounts:
                - mountPath: /snapshots
                  name: snapshots
          volumes:
            - name: snapshots
              hostPath:
                path: /snapshots
                type: DirectoryOrCreate
---
# ============================================================================
# CNCLI Keeper: detects and fixes stuck cncli processes (EKG port loop)
# Runs every 10 minutes, checks for processes stuck retrying EKG connection
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cardano-bp-cncli-keeper
  namespace: cardano-bp
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: cardano-bp-selfheal
          restartPolicy: Never
          containers:
            - name: cncli-keeper
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  DEPLOY="cardano-bp"
                  NS="cardano-bp"
                  POD=$(kubectl get pods -n $NS -l app=$DEPLOY -o jsonpath='{{.items[0].metadata.name}}' 2>/dev/null)
                  if [ -z "$POD" ]; then
                    echo "No pod found"
                    exit 0
                  fi

                  check_and_fix_stuck() {
                    local proc_name=$1
                    local log_file=$2
                    local pid
                    pid=$(kubectl exec -n $NS "$POD" -- pgrep -f "cncli.sh $proc_name" 2>/dev/null | head -1)
                    if [ -z "$pid" ]; then
                      echo "$proc_name: not running (OK or not started)"
                      return 0
                    fi

                    # Check if log shows repeated EKG connection errors (stuck in retry loop)
                    local ekg_errors
                    ekg_errors=$(kubectl exec -n $NS "$POD" -- tail -20 "$log_file" 2>/dev/null | grep -c "Could not connect to EKG" || echo 0)
                    if [ "$ekg_errors" -ge 5 ]; then
                      echo "WARNING: $proc_name (PID $pid) stuck in EKG retry loop ($ekg_errors errors). Killing..."
                      kubectl exec -n $NS "$POD" -- kill "$pid" 2>/dev/null || true
                      sleep 2
                      kubectl exec -n $NS "$POD" -- bash -c "nohup /opt/cardano/cnode/scripts/cncli.sh $proc_name >> $log_file 2>&1 &"
                      echo "$proc_name restarted"
                    else
                      echo "$proc_name: running OK (PID $pid)"
                    fi
                  }

                  check_and_fix_stuck "sync" "/opt/cardano/cnode/logs/cncli-sync.log"
                  check_and_fix_stuck "leaderlog" "/opt/cardano/cnode/logs/cncli-leaderlog.log"
                  check_and_fix_stuck "validate" "/opt/cardano/cnode/logs/cncli-validate.log"
                  echo "CNCLI keeper completed"
